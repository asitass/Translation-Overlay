<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <h1>Translation Settings</h1>
    <div id="pipeline-status" style="padding: 8px; margin-bottom: 12px; border-radius: 4px; background: #1a1a2e; color: #4caf50; font-size: 13px;">
      Pipeline: <span id="pipeline-status-text">connecting...</span>
    </div>
    <section>
      <h2>Translation Engine</h2>
      <label>Primary: <select id="primary-engine">
        <option value="bergamot">Bergamot (Offline)</option>
        <option value="google">Google Translate</option>
        <option value="ollama">Ollama (Local)</option>
        <option value="deepl">DeepL</option>
      </select></label>
      <label>Fallback: <select id="fallback-engine">
        <option value="bergamot">Bergamot (Offline)</option>
        <option value="google">Google Translate</option>
        <option value="ollama">Ollama (Local)</option>
        <option value="deepl">DeepL</option>
        <option value="none">None</option>
      </select></label>
    </section>
    <section>
      <h2>Languages</h2>
      <label>Target Language: <select id="target-lang">
        <option value="zh-CN">Chinese (Simplified)</option>
        <option value="en">English</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
      </select></label>
    </section>
    <section>
      <h2>Bergamot Status</h2>
      <div id="bergamot-status" style="padding: 6px 10px; border-radius: 4px; background: #2d2d2d; font-size: 13px;">
        <span style="color: #888;">Engine: </span><span id="bergamot-status-text">uninitialized</span>
        <span id="bergamot-model-info" style="color: #666; margin-left: 8px;"></span>
      </div>
    </section>
    <section>
      <h2>Ollama Settings</h2>
      <label>Model: <input type="text" id="ollama-model" value="qwen2.5:3b"></label>
      <label>Base URL: <input type="text" id="ollama-url" value="http://localhost:11434"></label>
    </section>
    <section>
      <h2>Overlay Style</h2>
      <label>Display Mode:
        <select id="display-mode">
          <option value="sideBySide">Side-by-Side</option>
          <option value="hover">Hover</option>
        </select>
      </label>
      <label>Font Size: <input type="range" id="font-size" min="10" max="24" value="14"> <span id="font-size-label">14px</span></label>
      <label>Background Opacity: <input type="range" id="bg-opacity" min="0" max="100" value="75"> <span id="bg-opacity-label">75%</span></label>
    </section>
    <section>
      <h2>Lock Mode</h2>
      <p style="color: #888; font-size: 12px; margin-bottom: 8px;">Choose how the pipeline behaves when screen content is stable.</p>
      <label class="radio-label">
        <input type="radio" name="lockMode" value="document" checked>
        <span>Document/Web</span>
        <span style="color: #888; font-size: 11px;"> — Pause translation when stable, save resources</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="lockMode" value="dynamic">
        <span>Video/Game</span>
        <span style="color: #888; font-size: 11px;"> — Keep translating, skip duplicate emissions</span>
      </label>
    </section>
    <div class="actions">
      <button id="save-btn">Save Settings</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
